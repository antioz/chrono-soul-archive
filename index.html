<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Прошлые жизни</title>
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      fetch("https://chrono-soul-backend-production.up.railway.app/api/stats")
        .then(r => r.json())
        .then(d => {
          const el = document.getElementById("user-count");
          if (el && d.users) el.textContent = `✦ Уже ${d.users.toLocaleString("ru")} человек узнали свои прошлые жизни`;
        })
        .catch(() => {});
    </script>
  </head>
  <body>
    <div class="app">
      <h1 class="landing-title">Узнай, кем ты был в прошлой жизни.</h1>

      <div class="hero-wrap">
        <img
          src="./assets/images/hero-placeholder.svg"
          alt="Chrono Soul Archive — дерево прошлых жизней"
          class="hero-image"
        />
      </div>

      <p class="social-proof" id="user-count"></p>
      <a href="./learn.html?reset=1" class="btn btn-primary">Начать</a>
      <a href="./description.html" class="btn-link" style="text-align:center; display:block;">О проекте</a>
    </div>
  </body>
</html>
