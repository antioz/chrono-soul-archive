<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 440">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0d2045"/>
      <stop offset="100%" stop-color="#060c18"/>
    </radialGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-sm" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="440" fill="url(#bg-grad)" rx="16"/>

  <!-- Tree of Life paths -->
  <line x1="200" y1="58" x2="125" y2="118" stroke="#22d3ee" stroke-width="1.5" opacity="0.55"/>
  <line x1="200" y1="58" x2="275" y2="118" stroke="#22d3ee" stroke-width="1.5" opacity="0.55"/>
  <line x1="125" y1="118" x2="275" y2="118" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
