  <text x="8" y="85" fill="#22d3ee" font-size="6.5" font-family="monospace" opacity="0.65">(AI-BASED)</text>
  <text x="8" y="136" fill="#22d3ee" font-size="6.5" font-family="monospace" opacity="0.65">KABBALAH</text>
  <text x="8" y="145" fill="#22d3ee" font-size="6.5" font-family="monospace" opacity="0.65">DATA STREAMS</text>
  <text x="268" y="76" fill="#22d3ee" font-size="6.5" font-family="monospace" opacity="0.65">KABBALAH</text>
  <text x="268" y="85" fill="#22d3ee" font-size="6.5" font-family="monospace" opacity="0.65">DATA STREAMS</text>
  <text x="8" y="355" fill="#22d3ee" font-size="6.5" font-family="monospace" opacity="0.65">GENETIC</text>
  <text x="8" y="364" fill="#22d3ee" font-size="6.5" font-family="monospace" opacity="0.65">DECODING</text>
  <text x="285" y="355" fill="#22d3ee" font-size="6.5" font-family="monospace" opacity="0.65">PAST LIFE MATRIX</text>
  <text x="8" y="432" fill="#22d3ee" font-size="6" font-family="monospace" opacity="0.45">PAST LIFE DECODER (AI-BASED)</text>
  <text x="252" y="432" fill="#22d3ee" font-size="6" font-family="monospace" opacity="0.45">2015.814.2022</text>
  <text x="392" y="240" fill="#22d3ee" font-size="5.5" font-family="monospace" opacity="0.4" transform="rotate(90,392,240)">NEURAL LINK · 2097</text>
  <text x="8" y="240" fill="#22d3ee" font-size="5.5" font-family="monospace" opacity="0.4" transform="rotate(-90,8,240)">X · C · I · X · H · O</text>
