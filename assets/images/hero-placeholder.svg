  <line x1="88" y1="208" x2="200" y2="248" stroke="#22d3ee" stroke-width="1.5" opacity="0.55"/>
  <line x1="312" y1="208" x2="200" y2="248" stroke="#22d3ee" stroke-width="1.5" opacity="0.55"/>
  <line x1="88" y1="208" x2="312" y2="208" stroke="#22d3ee" stroke-width="1" opacity="0.28"/>
  <line x1="200" y1="248" x2="112" y2="322" stroke="#22d3ee" stroke-width="1.5" opacity="0.55"/>
  <line x1="200" y1="248" x2="288" y2="322" stroke="#22d3ee" stroke-width="1.5" opacity="0.55"/>
  <line x1="112" y1="322" x2="288" y2="322" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
  <line x1="112" y1="322" x2="200" y2="378" stroke="#22d3ee" stroke-width="1.5" opacity="0.55"/>
