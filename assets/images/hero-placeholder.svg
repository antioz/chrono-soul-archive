  <polyline points="312,208 356,208 356,290" stroke="#22d3ee" stroke-width="1" opacity="0.28" fill="none"/>
  <polyline points="200,58 200,18 158,18" stroke="#22d3ee" stroke-width="1" opacity="0.28" fill="none"/>
  <polyline points="200,58 200,18 242,18" stroke="#22d3ee" stroke-width="1" opacity="0.28" fill="none"/>
