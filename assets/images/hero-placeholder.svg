  <text x="200" y="424" text-anchor="middle" fill="#22d3ee" font-size="12" font-family="serif">⊕</text>

  <!-- Circuit endpoint nodes -->
  <circle cx="44" cy="290" r="4" fill="#091a38" stroke="#22d3ee" stroke-width="1.2" opacity="0.7"/>
  <circle cx="356" cy="290" r="4" fill="#091a38" stroke="#22d3ee" stroke-width="1.2" opacity="0.7"/>
  <circle cx="158" cy="18" r="3" fill="#22d3ee" opacity="0.6"/>
  <circle cx="242" cy="18" r="3" fill="#22d3ee" opacity="0.6"/>
  <circle cx="68" cy="168" r="3" fill="#22d3ee" opacity="0.5"/>
